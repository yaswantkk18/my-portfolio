<!-- PDF Preview Modal -->
<div class="pdf-modal-overlay" id="pdfModalOverlay">
  <div class="pdf-modal">
    <div class="pdf-modal-header">
      <div class="pdf-modal-title" id="pdfModalTitle"></div>
      <div class="pdf-modal-actions">
        <a class="pdf-modal-btn" id="pdfModalOpen" href="#" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h10v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 2h5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>

        </a>
        <button class="pdf-modal-close" onclick="closePdfModal()" title="Close">&times;</button>
      </div>
    </div>
    <div class="pdf-modal-body">
      <div class="pdf-modal-loading" id="pdfModalLoading">
        <div class="pdf-modal-spinner"></div>
        Loading preview…
      </div>
      <iframe id="pdfModalIframe" allow="autoplay"></iframe>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script>
var BLOG_POSTS = [
  // { title: "Post Title", date: "March 2026", category: "Strategy", preview: "2-3 line preview", link: "#" },
];

function renderBlog() {
  var g = document.getElementById('blogGrid');
  if (!BLOG_POSTS.length) { g.innerHTML = '<div class="blog-empty">Blog posts will appear here once added.</div>'; return; }
  g.innerHTML = BLOG_POSTS.map(function(p) {
    return '<a href="' + (p.link||'#') + '" class="blog-card"><div class="blog-date">' + p.date + '</div><div class="blog-title">' + p.title + '</div><div class="blog-preview">' + p.preview + '</div><div class="blog-footer"><span class="blog-category">' + p.category + '</span><span class="blog-read">Read &rarr;</span></div></a>';
  }).join('');
}

renderBlog();
</script>
